name: Test Landing Zone Drift Check

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '0 * * * *'  # Every hour for testing
  workflow_dispatch:
    inputs:
      subscription_id:
        description: 'Azure subscription ID (defaults to config file subscription)'
        required: false
        default: ''
        type: string
      resource_group:
        description: 'Resource group name, or "*" to test all RGs in subscription'
        required: false
        default: ''
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  drift-check:
    uses: ./.github/workflows/drift-check-lz-hybrid.yml
    with:
      landing_zone: test-resources
      override_subscription: ${{ github.event.inputs.subscription_id }}
      override_resource_group: ${{ github.event.inputs.resource_group }}
    secrets: inherit
