# TEMPLATE: Copy this file to drift-lz-<TEAM_NAME>.yml and update:
# 1. name: your team name
# 2. schedule cron: your preferred schedule
# 3. landing_zone: your landing zone name (from lz-index.yml)

name: Landing Zone Drift Check - TEMPLATE (customize me)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '0 9 * * *'  # Example: daily at 9am UTC - change as needed
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  drift-check:
    uses: ./.github/workflows/drift-check-lz-hybrid.yml
    with:
      landing_zone: myteam  # Change to your landing zone name from lz-index.yml
    # Explicit secrets (least privilege) instead of `secrets: inherit`, which
    # would hand the reusable workflow every repo secret. Mirrors the map the
    # hybrid workflow declares; also shrinks its toJSON(secrets) blob to just these.
    secrets:
      BICEP_REPO_TOKEN: ${{ secrets.BICEP_REPO_TOKEN }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
      PLATFORM_SLACK_WEBHOOK: ${{ secrets.PLATFORM_SLACK_WEBHOOK }}
      WORKLOAD_SLACK_WEBHOOK: ${{ secrets.WORKLOAD_SLACK_WEBHOOK }}
