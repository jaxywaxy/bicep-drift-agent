name: Reusable Bicep Drift Check

on:
  workflow_call:
    inputs:
      bicep_file:
        description: 'Path to Bicep file to check'
        required: true
        type: string
      resource_group:
        description: 'Azure resource group name'
        required: true
        type: string
      fail_on_drift:
        description: 'Fail the workflow if drift is detected'
        required: false
        type: boolean
        default: false
      fail_threshold:
        description: 'Number of drift issues to fail on (0 = any drift)'
        required: false
        type: number
        default: 0
    secrets:
      ANTHROPIC_API_KEY:
        description: 'Anthropic API key'
        required: true
      AZURE_CLIENT_ID:
        description: 'Azure service principal client ID'
        required: true
      AZURE_TENANT_ID:
        description: 'Azure tenant ID'
        required: true
      AZURE_SUBSCRIPTION_ID:
        description: 'Azure subscription ID'
        required: true
      SLACK_WEBHOOK_URL:
        description: 'Slack webhook URL (optional)'
        required: false
      TEAMS_WEBHOOK_URL:
        description: 'Teams webhook URL (optional)'
        required: false
    outputs:
      total_drifts:
        description: 'Total number of drift issues detected'
        value: ${{ jobs.drift-check.outputs.total_drifts }}
      missing:
        description: 'Number of missing resources'
        value: ${{ jobs.drift-check.outputs.missing }}
      extra:
        description: 'Number of extra resources'
        value: ${{ jobs.drift-check.outputs.extra }}
      status:
        description: 'Drift check status (success or drift_found)'
        value: ${{ jobs.drift-check.outputs.status }}

jobs:
  drift-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    outputs:
      total_drifts: ${{ steps.drift.outputs.total_drifts }}
      missing: ${{ steps.drift.outputs.missing }}
      extra: ${{ steps.drift.outputs.extra }}
      status: ${{ steps.set-status.outputs.status }}

    steps:
      - name: Checkout drift-agent repo
        uses: actions/checkout@v7
        with:
          repository: jaxywaxy/bicep-drift-agent
          ref: main

      - name: Checkout caller repo
        uses: actions/checkout@v7
        with:
          path: caller-repo

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Azure CLI
        run: |
          curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash

      - name: Azure Login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Run drift check
        id: drift
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_PARAMETERS: '{}'
          PYTHONUNBUFFERED: '1'
        run: |
          BICEP_FILE="caller-repo/${{ inputs.bicep_file }}"
          RESOURCE_GROUP="${{ inputs.resource_group }}"

          echo "Running drift check..."
          echo "Bicep file: $BICEP_FILE"
          echo "Resource group: $RESOURCE_GROUP"
          echo ""

          python -u analyze_drift.py "$BICEP_FILE" "$RESOURCE_GROUP" 2>&1 | tee drift_output.txt
          EXIT_CODE=${PIPESTATUS[0]}

          if [ $EXIT_CODE -ne 0 ]; then
            echo ""
            echo "❌ Drift check failed with exit code $EXIT_CODE"
            exit $EXIT_CODE
          fi

          echo ""
          echo "✓ Drift check completed successfully"

          # Extract key metrics (set safe defaults)
          TOTAL_DRIFTS=$(grep -o "Found [0-9]*" drift_output.txt | head -1 | grep -o "[0-9]*" 2>/dev/null || true)
          TOTAL_DRIFTS="${TOTAL_DRIFTS:-0}"

          MISSING=$(grep -c "\[MISSING\]" drift_output.txt 2>/dev/null || true)
          MISSING="${MISSING:-0}"

          EXTRA=$(grep -c "\[EXTRA\]" drift_output.txt 2>/dev/null || true)
          EXTRA="${EXTRA:-0}"

          # Write outputs in correct format
          {
            echo "total_drifts=$TOTAL_DRIFTS"
            echo "missing=$MISSING"
            echo "extra=$EXTRA"
          } >> $GITHUB_OUTPUT

      - name: Determine status
        id: set-status
        env:
          TOTAL: ${{ steps.drift.outputs.total_drifts }}
          THRESHOLD: ${{ inputs.fail_threshold }}
          FAIL_ON_DRIFT: ${{ inputs.fail_on_drift }}
        run: |
          TOTAL="${TOTAL:-0}"
          THRESHOLD="${THRESHOLD:-0}"

          if [ "$TOTAL" = "0" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=drift_found" >> $GITHUB_OUTPUT

            if [ "$FAIL_ON_DRIFT" = "true" ] && [ "$TOTAL" -gt "$THRESHOLD" ]; then
              echo ""
              echo "❌ Drift threshold exceeded: $TOTAL > $THRESHOLD"
              exit 1
            fi
          fi

      - name: Post to Slack
        if: always()
        env:
          WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          TOTAL: ${{ steps.drift.outputs.total_drifts }}
          MISSING: ${{ steps.drift.outputs.missing }}
          EXTRA: ${{ steps.drift.outputs.extra }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          BICEP_FILE: ${{ inputs.bicep_file }}
          RG: ${{ inputs.resource_group }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then exit 0; fi

          if [ "$TOTAL" = "0" ] || [ -z "$TOTAL" ]; then
            STATUS="✅ No drift detected"
            COLOR="36a64f"
          else
            STATUS="⚠️ Drift detected"
            COLOR="ff9900"
          fi

          PAYLOAD=$(cat <<EOF
          {
            "attachments": [
              {
                "color": "$COLOR",
                "title": "Bicep Drift Check: $BICEP_FILE",
                "title_link": "$RUN_URL",
                "fields": [
                  {
                    "title": "Status",
                    "value": "$STATUS",
                    "short": false
                  },
                  {
                    "title": "Resource Group",
                    "value": "$RG",
                    "short": true
                  },
                  {
                    "title": "Total Issues",
                    "value": "${TOTAL:-0}",
                    "short": true
                  },
                  {
                    "title": "Missing Resources",
                    "value": "${MISSING:-0}",
                    "short": true
                  },
                  {
                    "title": "Extra Resources",
                    "value": "${EXTRA:-0}",
                    "short": true
                  }
                ]
              }
            ]
          }
          EOF
          )

          curl -X POST -H 'Content-type: application/json' \
            --data "$PAYLOAD" \
            "$WEBHOOK_URL" || echo "⚠️ Failed to post to Slack"

      - name: Post to Teams
        if: always()
        env:
          WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          TOTAL: ${{ steps.drift.outputs.total_drifts }}
          MISSING: ${{ steps.drift.outputs.missing }}
          EXTRA: ${{ steps.drift.outputs.extra }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          BICEP_FILE: ${{ inputs.bicep_file }}
          RG: ${{ inputs.resource_group }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then exit 0; fi

          if [ "$TOTAL" = "0" ] || [ -z "$TOTAL" ]; then
            STATUS="✅ No drift detected"
            THEME_COLOR="28a745"
          else
            STATUS="⚠️ Drift detected"
            THEME_COLOR="ffc107"
          fi

          PAYLOAD=$(cat <<EOF
          {
            "@type": "MessageCard",
            "@context": "https://schema.org/extensions",
            "summary": "Bicep Drift: $BICEP_FILE — $STATUS",
            "themeColor": "$THEME_COLOR",
            "sections": [
              {
                "activityTitle": "Bicep Drift Check",
                "activitySubtitle": "$BICEP_FILE in $RG",
                "facts": [
                  {
                    "name": "Status",
                    "value": "$STATUS"
                  },
                  {
                    "name": "Total Issues",
                    "value": "${TOTAL:-0}"
                  },
                  {
                    "name": "Missing Resources",
                    "value": "${MISSING:-0}"
                  },
                  {
                    "name": "Extra Resources",
                    "value": "${EXTRA:-0}"
                  },
                  {
                    "name": "Caller Repository",
                    "value": "${{ github.repository }}"
                  }
                ],
                "potentialAction": [
                  {
                    "@type": "OpenUri",
                    "name": "View Report",
                    "targets": [
                      {
                        "os": "default",
                        "uri": "$RUN_URL"
                      }
                    ]
                  }
                ]
              }
            ]
          }
          EOF
          )

          curl -X POST -H 'Content-Type: application/json' \
            --data "$PAYLOAD" \
            "$WEBHOOK_URL" || echo "⚠️ Failed to post to Teams"

      - name: Publish drift report to summary
        if: always()
        run: |
          TOTAL="${{ steps.drift.outputs.total_drifts }}"
          MISSING="${{ steps.drift.outputs.missing }}"
          EXTRA="${{ steps.drift.outputs.extra }}"

          # Determine status
          if [ "$TOTAL" = "0" ] || [ -z "$TOTAL" ]; then
            STATUS="✅ No drift detected"
          else
            STATUS="⚠️ Drift detected"
          fi

          {
            echo "## 🔍 Bicep Drift Check: ${{ inputs.bicep_file }}"
            echo ""
            echo "### Status: $STATUS"
            echo ""
            echo "**Resource Group:** \`${{ inputs.resource_group }}\`"
            echo ""
            echo "### Summary"
            echo "| Metric | Count |"
            echo "|--------|-------|"
            echo "| Total Issues | **${TOTAL:-0}** |"
            echo "| Missing Resources | ${MISSING:-0} |"
            echo "| Extra Resources | ${EXTRA:-0} |"
            echo ""

            if [ "$TOTAL" != "0" ] && [ -f drift_output.txt ]; then
              echo "### Issues Found"
              echo ""
              if grep -q "\[MISSING\]" drift_output.txt; then
                echo "#### Missing Resources"
                grep "\[MISSING\]" drift_output.txt | sed 's/^/- /' || echo "- (No details)"
                echo ""
              fi
              if grep -q "\[EXTRA\]" drift_output.txt; then
                echo "#### Extra Resources"
                grep "\[EXTRA\]" drift_output.txt | sed 's/^/- /' || echo "- (No details)"
                echo ""
              fi
            fi

            if [ -f drift_output.txt ]; then
              echo "<details>"
              echo "<summary>📋 Full Output</summary>"
              echo ""
              echo "\`\`\`"
              cat drift_output.txt
              echo "\`\`\`"
              echo ""
              echo "</details>"
            fi
          } >> $GITHUB_STEP_SUMMARY

      - name: Upload drift reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: drift-reports-${{ inputs.resource_group }}
          path: reports/
          retention-days: 30
          include-hidden-files: true
