name: Landing Zone Stacks Drift Check

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      subscription_id:
        description: 'Azure subscription ID (defaults to config file subscription)'
        required: false
        default: ''
        type: string
      resource_group:
        description: 'RG selector override, or "*" for the whole subscription'
        required: false
        default: ''
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  drift-check:
    uses: ./.github/workflows/drift-check-lz-hybrid.yml
    with:
      # Must match the key in .github/lz-index.yml, which is what selects the
      # config file. 'test-resources' would silently scan the NON-stack config.
      landing_zone: test-stack-resources
      override_subscription: ${{ github.event.inputs.subscription_id }}
      override_resource_group: ${{ github.event.inputs.resource_group }}
    # Explicit secrets (least privilege) instead of `secrets: inherit`, which
    # would hand the reusable workflow every repo secret. Mirrors the map the
    # hybrid workflow declares; also shrinks its toJSON(secrets) blob to just these.
    secrets:
      BICEP_REPO_TOKEN: ${{ secrets.BICEP_REPO_TOKEN }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
      PLATFORM_SLACK_WEBHOOK: ${{ secrets.PLATFORM_SLACK_WEBHOOK }}
      WORKLOAD_SLACK_WEBHOOK: ${{ secrets.WORKLOAD_SLACK_WEBHOOK }}