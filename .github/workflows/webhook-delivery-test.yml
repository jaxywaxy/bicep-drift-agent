name: Webhook Delivery Test

# Temporary diagnostic: posts a test message through each Slack webhook secret
# and prints the HTTP status + response body (never the URL's secret path).
# A real Slack incoming webhook answers "200 ok"; anything else explains
# missing channel messages.

on:
  workflow_dispatch:

permissions: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Post test message to each webhook secret
        env:
          PLATFORM_SLACK_WEBHOOK: ${{ secrets.PLATFORM_SLACK_WEBHOOK }}
          WORKLOAD_SLACK_WEBHOOK: ${{ secrets.WORKLOAD_SLACK_WEBHOOK }}
        run: |
          for name in PLATFORM_SLACK_WEBHOOK WORKLOAD_SLACK_WEBHOOK; do
            url="${!name}"
            if [ -z "$url" ]; then
              echo "❌ $name: secret is EMPTY"
              continue
            fi
            host=$(echo "$url" | cut -d/ -f3)
            echo "$name: host=$host, length=${#url}"
            code=$(curl -s -o /tmp/resp -w '%{http_code}' -X POST \
              -H 'Content-Type: application/json' \
              -d "{\"text\":\"🧪 drift-agent webhook delivery test ($name) $(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" \
              "$url" || echo "curl-failed")
            echo "$name: HTTP $code, body: $(head -c 300 /tmp/resp)"
          done
