name: Landing Zone Drift Check (Hybrid)

on:
  workflow_call:
    inputs:
      landing_zone:
        type: string
        required: true
        description: 'Landing Zone name from lz-index.yml'

jobs:
  load-config:
    name: Load LZ Config from External Repo
    runs-on: ubuntu-latest
    outputs:
      lz-config: ${{ steps.load.outputs.config }}
      lz-repo: ${{ steps.load.outputs.repo }}
      lz-name: ${{ steps.load.outputs.name }}
    steps:
      - name: Checkout drift-agent (for index)
        uses: actions/checkout@v4
        with:
          path: drift-agent

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Parse LZ Index and Load Config
        id: load
        run: |
          cd drift-agent

          # Install yaml parser
          pip install -q pyyaml

          python3 << 'PYTHON_SCRIPT'
          import yaml
          import sys
          import json

          LZ = '${{ inputs.landing_zone }}'

          # Load index
          with open('.github/lz-index.yml') as f:
            index = yaml.safe_load(f)

          if LZ not in index.get('landing_zones', {}):
            print(f"❌ Landing Zone '{LZ}' not found in lz-index.yml")
            sys.exit(1)

          lz_index = index['landing_zones'][LZ]
          repo = lz_index['repo']
          config_path = lz_index['config_path']

          print(f"✓ Found Landing Zone: {LZ}")
          print(f"  Repo: {repo}")
          print(f"  Config: {config_path}")

          # Save for next step
          with open('/tmp/lz_index.txt', 'w') as f:
            f.write(f"{repo}|{config_path}")

          PYTHON_SCRIPT

          # Read saved values
          IFS='|' read REPO CONFIG_PATH < /tmp/lz_index.txt
          echo "repo=$REPO" >> $GITHUB_OUTPUT
          echo "config_path=$CONFIG_PATH" >> $GITHUB_OUTPUT
          echo "name=${{ inputs.landing_zone }}" >> $GITHUB_OUTPUT

      - name: Checkout external Bicep repo
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.load.outputs.repo }}
          path: lz-repo
          fetch-depth: 1
          token: ${{ secrets.BICEP_REPO_TOKEN }}

      - name: Load LZ Config from External Repo
        id: config
        run: |
          CONFIG_PATH="${{ steps.load.outputs.config_path }}"
          CONFIG_FILE="lz-repo/$CONFIG_PATH"

          if [ ! -f "$CONFIG_FILE" ]; then
            echo "❌ Config file not found: $CONFIG_PATH in ${{ steps.load.outputs.repo }}"
            exit 1
          fi

          echo "✓ Loaded config from: $CONFIG_PATH"

          # Output config
          {
            echo "config<<EOF"
            cat "$CONFIG_FILE"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Parse and Validate Config
        run: |
          python3 << 'PYTHON_SCRIPT'
          import yaml
          import sys

          config_text = """${{ steps.config.outputs.config }}"""

          try:
            config = yaml.safe_load(config_text)
            checks = config.get('checks', [])
            notif = config.get('notifications', {})

            print(f"✓ Config valid")
            print(f"  Name: {config.get('name', 'unknown')}")
            print(f"  Checks: {len(checks)}")
            print(f"  Notifications: {', '.join(notif.keys())}")

          except Exception as e:
            print(f"❌ Invalid config: {e}")
            sys.exit(1)

          PYTHON_SCRIPT

  drift-checks:
    name: Drift Check - ${{ matrix.check.name }}
    needs: load-config
    strategy:
      matrix:
        check: ${{ fromJson(needs.load-config.outputs.lz-config).checks }}
      fail-fast: false

    runs-on: ubuntu-latest
    steps:
      - name: Checkout drift detection tools
        uses: actions/checkout@v4
        with:
          path: drift-tools

      - name: Checkout Bicep repository
        uses: actions/checkout@v4
        with:
          repository: ${{ matrix.check.repo }}
          ref: ${{ matrix.check.branch || 'main' }}
          path: bicep-${{ matrix.check.name }}
          fetch-depth: 1
          token: ${{ secrets.BICEP_REPO_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd drift-tools
          python -m pip install -q -r requirements.txt

      - name: Run drift checks - ${{ matrix.check.name }}
        id: drift
        run: |
          BICEP_PATH="bicep-${{ matrix.check.name }}/${{ matrix.check.path }}"
          DRIFT_FILE="drift_${{ matrix.check.name }}.txt"

          echo "========================================" > "$DRIFT_FILE"
          echo "Layer: ${{ matrix.check.name }}" >> "$DRIFT_FILE"
          echo "Repository: ${{ matrix.check.repo }}" >> "$DRIFT_FILE"
          echo "Branch: ${{ matrix.check.branch || 'main' }}" >> "$DRIFT_FILE"
          echo "Bicep File: ${{ matrix.check.path }}" >> "$DRIFT_FILE"
          echo "========================================" >> "$DRIFT_FILE"
          echo "" >> "$DRIFT_FILE"

          # Test each resource group
          RG_COUNT=$(echo '${{ toJson(matrix.check.resource_groups) }}' | jq 'length')
          echo "Testing $RG_COUNT resource group(s)..."

          echo '${{ toJson(matrix.check.resource_groups) }}' | jq -r '.[]' | while read RG; do
            echo "Testing: $RG" | tee -a "$DRIFT_FILE"
            echo "---" >> "$DRIFT_FILE"

            cd drift-tools
            python3 analyze_drift.py "../$BICEP_PATH" "$RG" >> "../$DRIFT_FILE" 2>&1 || true
            cd ..

            echo "" >> "$DRIFT_FILE"
          done

          # Count issues
          DRIFT_COUNT=$(grep -c "^\[DRIFT\]" "$DRIFT_FILE" || echo "0")
          EXTRA_COUNT=$(grep -c "^\[EXTRA\]" "$DRIFT_FILE" || echo "0")
          MISSING_COUNT=$(grep -c "^\[MISSING\]" "$DRIFT_FILE" || echo "0")
          TOTAL_ISSUES=$((DRIFT_COUNT + EXTRA_COUNT + MISSING_COUNT))

          echo "drift_count=$DRIFT_COUNT" >> $GITHUB_OUTPUT
          echo "extra_count=$EXTRA_COUNT" >> $GITHUB_OUTPUT
          echo "missing_count=$MISSING_COUNT" >> $GITHUB_OUTPUT
          echo "total_issues=$TOTAL_ISSUES" >> $GITHUB_OUTPUT

          echo "Results: $DRIFT_COUNT drift(s), $EXTRA_COUNT extra, $MISSING_COUNT missing"

      - name: Upload drift report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: drift-reports-${{ needs.load-config.outputs.lz-name }}
          path: drift_*.txt
          retention-days: 30

  consolidate-results:
    name: Consolidate and Notify
    needs: [load-config, drift-checks]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout drift detection tools
        uses: actions/checkout@v4

      - name: Download all drift reports
        uses: actions/download-artifact@v3
        with:
          name: drift-reports-${{ needs.load-config.outputs.lz-name }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install -q -r requirements.txt

      - name: Consolidate reports
        id: consolidate
        run: |
          echo "Consolidating drift reports..."

          > consolidated_drift_report.txt

          for file in drift_*.txt; do
            [ -f "$file" ] && cat "$file" >> consolidated_drift_report.txt
            [ -f "$file" ] && echo "" >> consolidated_drift_report.txt
          done

          # Count totals
          TOTAL_DRIFT=$(grep -c "^\[DRIFT\]" consolidated_drift_report.txt || echo "0")
          TOTAL_EXTRA=$(grep -c "^\[EXTRA\]" consolidated_drift_report.txt || echo "0")
          TOTAL_MISSING=$(grep -c "^\[MISSING\]" consolidated_drift_report.txt || echo "0")
          TOTAL_ISSUES=$((TOTAL_DRIFT + TOTAL_EXTRA + TOTAL_MISSING))

          echo "total_issues=$TOTAL_ISSUES" >> $GITHUB_OUTPUT
          echo "total_drift=$TOTAL_DRIFT" >> $GITHUB_OUTPUT
          echo "total_extra=$TOTAL_EXTRA" >> $GITHUB_OUTPUT
          echo "total_missing=$TOTAL_MISSING" >> $GITHUB_OUTPUT

          echo "✓ Consolidated Results:"
          echo "  - DRIFT (configuration changes): $TOTAL_DRIFT"
          echo "  - EXTRA (orphaned resources): $TOTAL_EXTRA"
          echo "  - MISSING (undeployed resources): $TOTAL_MISSING"
          echo "  - TOTAL ISSUES: $TOTAL_ISSUES"

      - name: Send consolidated notifications
        if: always()
        env:
          LZ_CONFIG: ${{ needs.load-config.outputs.lz-config }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          PYTHONUNBUFFERED: '1'
        run: |
          # Extract notifications from config
          NOTIFICATIONS=$(echo "$LZ_CONFIG" | python3 -c "
          import sys, yaml
          config = yaml.safe_load(sys.stdin)
          import json
          print(json.dumps(config.get('notifications', {})))
          ")

          if [ -z "$NOTIFICATIONS" ] || [ "$NOTIFICATIONS" = "{}" ]; then
            echo "ℹ No notifications configured for this landing zone"
            exit 0
          fi

          # Pass as env var for send_notifications.py
          export DRIFT_NOTIFICATIONS="$NOTIFICATIONS"

          REPORT_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "Sending notifications to configured channels..."
          python3 tools/send_notifications.py consolidated_drift_report.txt "$REPORT_URL"

      - name: Publish summary to GitHub
        if: always()
        run: |
          LZ="${{ needs.load-config.outputs.lz-name }}"
          TOTAL="${{ steps.consolidate.outputs.total_issues }}"
          DRIFT="${{ steps.consolidate.outputs.total_drift }}"
          EXTRA="${{ steps.consolidate.outputs.total_extra }}"
          MISSING="${{ steps.consolidate.outputs.total_missing }}"

          {
            echo "## 🏗️ Landing Zone: $LZ"
            echo ""
            if [ "$TOTAL" = "0" ]; then
              echo "### ✅ No drift detected"
            else
              echo "### ⚠️ Drift Detected"
            fi
            echo ""
            echo "| Metric | Count |"
            echo "|--------|-------|"
            echo "| Configuration Changes (DRIFT) | $DRIFT |"
            echo "| Orphaned Resources (EXTRA) | $EXTRA |"
            echo "| Undeployed Resources (MISSING) | $MISSING |"
            echo "| **TOTAL** | **$TOTAL** |"
            echo ""
            echo "### Details"
            if [ -f consolidated_drift_report.txt ]; then
              echo "\`\`\`"
              grep "^\[DRIFT\]\|^\[EXTRA\]\|^\[MISSING\]" consolidated_drift_report.txt | head -30 || echo "No issues found"
              echo "\`\`\`"
            fi
            echo ""
            echo "[View Full Report](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          } >> $GITHUB_STEP_SUMMARY
