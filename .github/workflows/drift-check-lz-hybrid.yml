name: Landing Zone Drift Check (Hybrid)

on:
  workflow_call:
    inputs:
      landing_zone:
        type: string
        required: true
        description: 'Landing Zone name from lz-index.yml'
      override_subscription:
        type: string
        required: false
        default: ''
        description: 'Override subscription ID from config'
      override_resource_group:
        type: string
        required: false
        default: ''
        description: 'Override resource group name from config'
    secrets:
      BICEP_REPO_TOKEN:
        required: false
      AZURE_CLIENT_ID:
        required: true
      AZURE_TENANT_ID:
        required: true
      ANTHROPIC_API_KEY:
        required: true
      SLACK_WEBHOOK_URL:
        required: false
      TEAMS_WEBHOOK_URL:
        required: false
      PLATFORM_SLACK_WEBHOOK:
        required: false
      WORKLOAD_SLACK_WEBHOOK:
        required: false

jobs:
  load-config:
    name: Load LZ Config from External Repo
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --no-warnings=DEP0005
    outputs:
      lz-repo: ${{ steps.load.outputs.repo }}
      lz-config-path: ${{ steps.load.outputs.config_path }}
      lz-name: ${{ steps.load.outputs.name }}
      lz-checks: ${{ steps.validate.outputs.checks }}
      lz-notifications: ${{ steps.validate.outputs.notifications }}
      lz-subscription-id: ${{ steps.validate.outputs.subscription_id }}
    steps:
      - name: Checkout drift-agent (for index)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          path: drift-agent

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.14'

      - name: Parse LZ Index and Load Config
        id: load
        env:
          LANDING_ZONE: ${{ inputs.landing_zone }}
        run: |
          cd drift-agent

          # Install yaml parser
          pip install -q pyyaml

          python3 << 'PYTHON_SCRIPT'
          import yaml
          import sys
          import os

          try:
            LZ = os.environ['LANDING_ZONE']

            # Load index
            with open('.github/lz-index.yml') as f:
              index = yaml.safe_load(f)

            if LZ not in index.get('landing_zones', {}):
              print(f"❌ Landing Zone '{LZ}' not found in lz-index.yml")
              sys.exit(1)

            lz_index = index['landing_zones'][LZ]
            repo = lz_index['repo']
            config_path = lz_index['config_path']

            print(f"✓ Found Landing Zone: {LZ}")
            print(f"  Repo: {repo}")
            print(f"  Config: {config_path}")

            # Write directly to GitHub Actions output
            github_output = os.environ.get('GITHUB_OUTPUT')
            if not github_output:
              print("❌ GITHUB_OUTPUT env var not set")
              sys.exit(1)

            with open(github_output, 'a') as f:
              f.write(f"repo={repo}\n")
              f.write(f"config_path={config_path}\n")
              f.write(f"name={LZ}\n")

            print(f"✓ Outputs written to $GITHUB_OUTPUT")

          except Exception as e:
            print(f"❌ Error: {e}")
            import traceback
            traceback.print_exc()
            sys.exit(1)

          PYTHON_SCRIPT

      - name: Checkout external Bicep repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: ${{ steps.load.outputs.repo }}
          path: lz-repo
          fetch-depth: 1
          token: ${{ secrets.BICEP_REPO_TOKEN || github.token }}

      - name: Load LZ Config from External Repo
        id: config
        env:
          CONFIG_PATH_IN: ${{ steps.load.outputs.config_path }}
          LZ_REPO: ${{ steps.load.outputs.repo }}
        run: |
          CONFIG_PATH="$CONFIG_PATH_IN"
          CONFIG_FILE="lz-repo/$CONFIG_PATH"

          if [ ! -f "$CONFIG_FILE" ]; then
            echo "❌ Config file not found: $CONFIG_PATH in $LZ_REPO"
            exit 1
          fi

          echo "✓ Loaded config from: $CONFIG_PATH"

          # Output config (base64 encoded to handle multiline)
          CONFIG_B64=$(cat "$CONFIG_FILE" | base64 -w0)
          echo "config=$CONFIG_B64" >> $GITHUB_OUTPUT

      - name: Parse and Validate Config
        id: validate
        env:
          CONFIG_B64: ${{ steps.config.outputs.config }}
          OVERRIDE_SUB: ${{ inputs.override_subscription }}
          OVERRIDE_RG: ${{ inputs.override_resource_group }}
        run: |
          python3 << 'PYTHON_SCRIPT'
          import yaml
          import sys
          import base64
          import json
          import os

          config_b64 = os.environ["CONFIG_B64"]
          config_text = base64.b64decode(config_b64).decode('utf-8')

          try:
            config = yaml.safe_load(config_text)
            checks = config.get('checks', [])
            notif = config.get('notifications', {})
            subscription_id = config.get('subscription_id', '')
            resource_group = config.get('resource_group', '')

            # Apply overrides from workflow_dispatch inputs
            override_sub = os.environ.get("OVERRIDE_SUB", "")
            override_rg = os.environ.get("OVERRIDE_RG", "")

            if override_sub:
              subscription_id = override_sub
              print(f"ℹ Override subscription ID: {subscription_id}")

            if override_rg:
              resource_group = override_rg
              print(f"ℹ Override resource group: {resource_group}")

            print(f"✓ Config valid")
            print(f"  Name: {config.get('name', 'unknown')}")
            print(f"  Subscription ID: {subscription_id if subscription_id else '(not specified)'}")
            print(f"  Resource Group: {resource_group if resource_group else '(not specified)'}")
            print(f"  Checks: {len(checks)}")
            print(f"  Notifications: {', '.join(notif.keys())}")

            # Output checks array as JSON for matrix (single line, no newlines)
            github_output = os.environ.get('GITHUB_OUTPUT')
            if github_output:
              checks_json = json.dumps(checks, separators=(',', ':'))
              notif_json = json.dumps(notif, separators=(',', ':'))
              with open(github_output, 'a') as f:
                f.write(f"checks={checks_json}\n")
                f.write(f"notifications={notif_json}\n")
                f.write(f"subscription_id={subscription_id}\n")
                f.write(f"resource_group={resource_group}\n")
              print(f"✓ Config outputs written to GitHub")

          except Exception as e:
            print(f"❌ Invalid config: {e}")
            sys.exit(1)

          PYTHON_SCRIPT

  drift-checks:
    name: Drift Check - ${{ matrix.check.name }}
    needs: load-config
    strategy:
      matrix:
        check: ${{ fromJson(needs.load-config.outputs.lz-checks) }}
      fail-fast: false

    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      AZURE_SUBSCRIPTION_ID: ${{ needs.load-config.outputs.lz-subscription-id }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      # Extra IaC deployer identities (object IDs/appIds/UPNs, comma-separated)
      # whose changes are attributed as pipeline deployments instead of manual
      # drift. The scanning identity is always recognised automatically; set
      # the repo variable only when estates are deployed by a DIFFERENT
      # identity than the one this workflow scans with.
      DRIFT_AUTHORIZED_DEPLOYERS: ${{ vars.DRIFT_AUTHORIZED_DEPLOYERS || '' }}
      NODE_OPTIONS: --no-warnings=DEP0005
    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}
      - name: Checkout drift detection tools
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          path: drift-tools

      - name: Checkout Bicep repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: ${{ matrix.check.repo }}
          ref: ${{ matrix.check.branch || 'main' }}
          path: bicep-${{ matrix.check.name }}
          fetch-depth: 1
          token: ${{ secrets.BICEP_REPO_TOKEN || github.token }}

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          cd drift-tools
          python -m pip install -q -r requirements.txt

      - name: Run drift checks - ${{ matrix.check.name }}
        id: drift
        env:
          # matrix.check.* comes from the EXTERNAL, untrusted LZ config; never
          # interpolate it straight into run: shell. Bind to env vars and use
          # "$VAR" so a crafted config value can't inject shell commands.
          CHECK_NAME: ${{ matrix.check.name }}
          CHECK_REPO: ${{ matrix.check.repo }}
          CHECK_BRANCH: ${{ matrix.check.branch || 'main' }}
          CHECK_PATH: ${{ matrix.check.path }}
          CHECK_SUBSCRIPTION_SCOPED: ${{ matrix.check.subscription_scoped }}
          CHECK_RESOURCE_GROUPS: ${{ toJson(matrix.check.resource_groups) }}
        run: |
          BICEP_PATH="bicep-$CHECK_NAME/$CHECK_PATH"
          DRIFT_FILE="drift_$CHECK_NAME.txt"

          echo "========================================" > "$DRIFT_FILE"
          echo "Layer: $CHECK_NAME" >> "$DRIFT_FILE"
          echo "Repository: $CHECK_REPO" >> "$DRIFT_FILE"
          echo "Branch: $CHECK_BRANCH" >> "$DRIFT_FILE"
          echo "Bicep File: $CHECK_PATH" >> "$DRIFT_FILE"
          echo "========================================" >> "$DRIFT_FILE"
          echo "" >> "$DRIFT_FILE"

          # Resolve resource-group selectors.
          #   - subscription_scoped check: the template is subscription-scoped
          #     (a landing zone spanning several RGs). Pass the selector ('*' or a
          #     glob like 'jacquidev-*') STRAIGHT THROUGH - the agent scans the LZ
          #     in one sub-wide pass filtered to matching RGs. Do NOT expand, or
          #     each RG would be compared to the whole template (false 'missing').
          #   - otherwise (RG-scoped template): a '*'/glob is expanded against the
          #     live RG list so each resolved RG runs its own single-RG pipeline
          #     (Phase 4 #4).
          readarray -t SELECTORS < <(echo "$CHECK_RESOURCE_GROUPS" | jq -r '.[]')
          if [ "$CHECK_SUBSCRIPTION_SCOPED" = "true" ]; then
            echo "Subscription-scoped landing zone; scanning selector(s) in a single pass: ${SELECTORS[*]}"
            RESOURCE_GROUPS=("${SELECTORS[@]}")
          elif echo "${SELECTORS[@]}" | grep -qE '[*?[]'; then
            echo "Expanding resource-group selectors against the subscription: ${SELECTORS[*]}"
            readarray -t RESOURCE_GROUPS < <(az group list --query "[].name" -o tsv | PYTHONPATH=drift-tools python3 -m tools.rg_selector "${SELECTORS[@]}")
          else
            RESOURCE_GROUPS=("${SELECTORS[@]}")
          fi
          echo "Testing ${#RESOURCE_GROUPS[@]} target(s)..."

          for RG in "${RESOURCE_GROUPS[@]}"; do
            echo "Testing: $RG" | tee -a "$DRIFT_FILE"
            echo "---" >> "$DRIFT_FILE"

            cd drift-tools
            python3 analyze_drift.py "../$BICEP_PATH" "$RG" >> "../$DRIFT_FILE" 2>&1 || true
            cd ..

            echo "" >> "$DRIFT_FILE"
          done

          # Count issues from the JSON reports, NOT by grepping the log above.
          # The log is the run's only diagnostic record (stdout/stderr are
          # redirected into it) but it is a terrible source of truth: grepping
          # it for "^[DRIFT]" ties the headline number to log formatting and
          # cannot tell "no drift" from "no report". It failed exactly that way
          # in production - a Claude credit error aborted Phase 2 before the
          # summary printed, so grep returned 0 while the report held 37
          # actionable drifts. count_drifts.py reads the same JSON the report
          # and notifications use, and FAILS if no report exists.
          # (This job checks the agent out under drift-tools/, hence the path.)
          python3 drift-tools/tools/count_drifts.py drift-tools/reports

      - name: Prepare reports for upload
        if: always()
        run: |
          # Copy reports to top-level for clean artifact structure
          mkdir -p reports

          # Copy JSON and HTML reports from drift-tools
          if [ -d "drift-tools/reports" ]; then
            cp -r drift-tools/reports/* reports/ 2>/dev/null || true
          fi

          # Copy drift text files for consolidation
          cp drift_*.txt reports/ 2>/dev/null || true

      - name: Upload drift reports and analysis
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: drift-reports-${{ needs.load-config.outputs.lz-name }}
          path: reports/
          retention-days: 30

  consolidate-results:
    name: Consolidate and Notify
    needs: [load-config, drift-checks]
    if: always()
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --no-warnings=DEP0005
    steps:
      - name: Checkout drift detection tools
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Download all drift reports
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: drift-reports-${{ needs.load-config.outputs.lz-name }}

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install -q -r requirements.txt

      - name: Consolidate reports
        id: consolidate
        run: |
          echo "Consolidating drift reports..."

          > consolidated_drift_report.txt

          # Look for drift files in current directory (artifact downloads files directly)
          for file in drift_*.txt; do
            [ -f "$file" ] && cat "$file" >> consolidated_drift_report.txt
            [ -f "$file" ] && echo "" >> consolidated_drift_report.txt
          done

          # Totals come from the JSON reports (downloaded into the workspace
          # root by the artifact step), not from grepping the concatenated log.
          # The log stays for diagnosis; it is not a source of truth. See
          # tools/count_drifts.py.
          # Emits drift_count / extra_count / missing_count / total_issues -
          # the SAME keys as the per-check step (this step used to emit
          # total_drift/total_extra/total_missing for the identical facts).
          python3 tools/count_drifts.py .

      - name: Checkout external repo for notifications config
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: ${{ needs.load-config.outputs.lz-repo }}
          path: lz-repo
          fetch-depth: 1
          token: ${{ secrets.BICEP_REPO_TOKEN || github.token }}

      - name: Publish drift issue to landing-zone repo
        id: lz_issue
        if: always()
        env:
          # Needs issues:write on the LZ repo. Falls back to github.token
          # (works only when the LZ config lives in THIS repo); a missing or
          # under-scoped token skips publication with a warning - never fails.
          DRIFT_ISSUE_TOKEN: ${{ secrets.BICEP_REPO_TOKEN || github.token }}
          PYTHONUNBUFFERED: '1'
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          # Reports (*-drift.json) were downloaded into the workspace root.
          python3 tools/publish_lz_issue.py . \
            "${{ needs.load-config.outputs.lz-repo }}" \
            "${{ needs.load-config.outputs.lz-name }}" \
            "$RUN_URL"

      - name: Send consolidated notifications
        if: always()
        env:
          CONFIG_PATH: ${{ needs.load-config.outputs.lz-config-path }}
          LZ_NAME: ${{ needs.load-config.outputs.lz-name }}
          # Workload-routed teams link here instead of the Actions run (which
          # needs drift-agent repo read access they typically don't have).
          DRIFT_ISSUE_URL: ${{ steps.lz_issue.outputs.issue_url }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          # Full secrets context for ${DRIFT_WEBHOOK_*} placeholder expansion in
          # LZ configs; send_notifications.py only ever reads DRIFT_WEBHOOK_*
          # names from this blob (LZ config is untrusted, see expand_webhook_secrets).
          WEBHOOK_SECRETS: ${{ toJSON(secrets) }}
          # Bridge pre-existing secret names into the expandable DRIFT_WEBHOOK_*
          # namespace (env vars take precedence over the blob). New secrets
          # should just be created with the DRIFT_WEBHOOK_ prefix instead.
          DRIFT_WEBHOOK_PLATFORM: ${{ secrets.PLATFORM_SLACK_WEBHOOK }}
          DRIFT_WEBHOOK_WORKLOAD: ${{ secrets.WORKLOAD_SLACK_WEBHOOK }}
          PYTHONUNBUFFERED: '1'
        run: |
          # Normalize the config's notifications block into the team structure
          # DRIFT_NOTIFICATIONS expects. Supports both a flat single-channel block
          # and a multi-team owner-routing block (build_team_notifications).
          NOTIFICATIONS=$(python3 << 'PYTHON_SCRIPT'
          import sys, yaml, json, os
          sys.path.insert(0, ".")
          from tools.send_notifications import build_team_notifications

          config_path = os.environ.get('CONFIG_PATH', '.github/drift-lz-config.yml')
          lz_name = os.environ.get('LZ_NAME', 'default')
          config_file = f"lz-repo/{config_path}"

          if not os.path.exists(config_file):
            print("{}")
            sys.exit(0)

          try:
            with open(config_file) as f:
              config = yaml.safe_load(f)
            team_notifications = build_team_notifications(config.get('notifications', {}), lz_name)
            print(json.dumps(team_notifications))
          except Exception as e:
            print(f"❌ Error reading config: {e}", file=sys.stderr)
            print("{}")
          PYTHON_SCRIPT
          )

          if [ -z "$NOTIFICATIONS" ] || [ "$NOTIFICATIONS" = "{}" ]; then
            echo "ℹ No notifications configured for this landing zone"
            exit 0
          fi

          # Pass as env var for send_notifications.py
          export DRIFT_NOTIFICATIONS="$NOTIFICATIONS"

          REPORT_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "Sending notifications to configured channels..."
          # Prefer the owner-tagged JSON reports (enables owner routing); the
          # per-resource-group *-drift.json land in the downloaded artifact dir.
          # Fall back to the concatenated text report if no JSON is present.
          if ls *-drift.json >/dev/null 2>&1; then
            python3 tools/send_notifications.py . "$REPORT_URL"
          else
            python3 tools/send_notifications.py consolidated_drift_report.txt "$REPORT_URL"
          fi

      - name: Publish summary to GitHub
        if: always()
        run: |
          LZ="${{ needs.load-config.outputs.lz-name }}"
          TOTAL="${{ steps.consolidate.outputs.total_issues }}"
          DRIFT="${{ steps.consolidate.outputs.drift_count }}"
          EXTRA="${{ steps.consolidate.outputs.extra_count }}"
          MISSING="${{ steps.consolidate.outputs.missing_count }}"
          # DRIFT counts CHANGED RESOURCES - the stable unit, and the one you
          # remediate (redeploy the module). CHANGES is diff PATHS, shown as
          # supporting detail only: one human action can emit several paths
          # (loosening a firewall rule emits 3), so it is not a finding count.
          CHANGES="${{ steps.consolidate.outputs.changed_property_count }}"
          CRITICAL="${{ steps.consolidate.outputs.critical_count }}"

          {
            echo "## 🏗️ Landing Zone: $LZ"
            echo ""
            if [ "$TOTAL" = "0" ]; then
              echo "### ✅ No drift detected"
            else
              echo "### ⚠️ Drift Detected"
            fi
            echo ""
            echo "| Metric | Count |"
            echo "|--------|-------|"
            echo "| Changed Resources (DRIFT) | $DRIFT |"
            echo "| └ Property paths changed | $CHANGES |"
            if [ "$CRITICAL" != "0" ]; then
              echo "| └ **🚨 Critical** | **$CRITICAL** |"
            fi
            echo "| Orphaned Resources (EXTRA) | $EXTRA |"
            echo "| Undeployed Resources (MISSING) | $MISSING |"
            echo "| **TOTAL** | **$TOTAL** |"
            echo ""
            echo "### Details"
            if [ -f consolidated_drift_report.txt ]; then
              echo "\`\`\`"
              grep "^\[DRIFT\]\|^\[EXTRA\]\|^\[MISSING\]" consolidated_drift_report.txt | head -30 || echo "No issues found"
              echo "\`\`\`"
            fi
            echo ""
            echo "### 📊 Reports"
            echo "- **Full Report:** [View Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
            echo "- **HTML Reports:** Download from Artifacts (drift-reports-$LZ.zip)"
          } >> $GITHUB_STEP_SUMMARY
