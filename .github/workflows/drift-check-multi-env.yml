name: Bicep Drift Check - Multi-Environment

on:
  workflow_dispatch:
    inputs:
      dev-enabled:
        description: 'Check dev environment'
        required: false
        type: boolean
        default: true
      staging-enabled:
        description: 'Check staging environment'
        required: false
        type: boolean
        default: false
      prod-enabled:
        description: 'Check prod environment'
        required: false
        type: boolean
        default: true

jobs:
  drift-check-dev:
    if: github.event.inputs.dev-enabled == 'true'
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/drift-check-reusable.yml
    with:
      bicep_file: ./infra/main.bicep
      resource_group: rg-dev
      fail_on_drift: false
    secrets: inherit

  drift-check-staging:
    if: github.event.inputs.staging-enabled == 'true'
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/drift-check-reusable.yml
    with:
      bicep_file: ./infra/main.bicep
      resource_group: rg-staging
      fail_on_drift: false
    secrets: inherit

  drift-check-prod:
    if: github.event.inputs.prod-enabled == 'true'
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/drift-check-reusable.yml
    with:
      bicep_file: ./infra/main.bicep
      resource_group: rg-prod
      fail_on_drift: false
    secrets: inherit

  summary:
    needs: [drift-check-dev, drift-check-staging, drift-check-prod]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "## 🔍 Multi-Environment Drift Check Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Environments Checked" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.event.inputs.dev-enabled }}" = "true" ]; then
            echo "- ✓ **rg-dev**: ./infra/main.bicep" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ github.event.inputs.staging-enabled }}" = "true" ]; then
            echo "- ✓ **rg-staging**: ./infra/main.bicep" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ github.event.inputs.prod-enabled }}" = "true" ]; then
            echo "- ✓ **rg-prod**: ./infra/main.bicep" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📊 View Reports" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Click the **Artifacts** button at the top right to download reports:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.event.inputs.dev-enabled }}" = "true" ]; then
            echo "- **drift-reports-rg-dev** → Open `rg-dev-drift.html` in browser" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ github.event.inputs.staging-enabled }}" = "true" ]; then
            echo "- **drift-reports-rg-staging** → Open `rg-staging-drift.html` in browser" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ github.event.inputs.prod-enabled }}" = "true" ]; then
            echo "- **drift-reports-rg-prod** → Open `rg-prod-drift.html` in browser" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Each report includes:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- 📈 Summary metrics and status" >> $GITHUB_STEP_SUMMARY
          echo "- 🔍 Detailed drift table" >> $GITHUB_STEP_SUMMARY
          echo "- 💡 Claude AI remediation recommendations" >> $GITHUB_STEP_SUMMARY
          echo "- 📄 Full analysis and details" >> $GITHUB_STEP_SUMMARY
