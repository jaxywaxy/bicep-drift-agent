name: Bicep Drift Check

on:
  push:
    branches: [main, develop]
    paths:
      - 'infra/**/*.bicep'
      - '.github/workflows/drift-check.yml'
  pull_request:
    branches: [main]
    paths:
      - 'infra/**/*.bicep'
  workflow_dispatch:
    inputs:
      bicep_file:
        description: 'Path to bicep file (or use DRIFT_BICEP_FILE env var)'
        required: false
        default: ''
      resource_group:
        description: 'Azure resource group (or use DRIFT_RESOURCE_GROUP env var)'
        required: false
        default: ''

jobs:
  drift-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout drift detection tools
        uses: actions/checkout@v7

      - name: Checkout external Bicep repository (shallow clone)
        uses: actions/checkout@v7
        with:
          repository: ${{ vars.DRIFT_BICEP_REPO || 'jaxywaxy/drift-test-resources' }}
          ref: ${{ vars.DRIFT_BICEP_BRANCH || 'main' }}
          path: bicep-repo
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Azure CLI
        run: |
          curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash

      - name: Azure Login
        if: github.event_name != 'pull_request'
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Run drift check
        id: drift
        if: github.event_name != 'pull_request'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_PARAMETERS: ${{ vars.DRIFT_ARM_PARAMETERS || '{"environment":"prod","location":"australiaeast"}' }}
          PYTHONUNBUFFERED: '1'
        run: |
          # Priority: workflow input > env var > default
          BICEP_FILE="${{ github.event.inputs.bicep_file }}"
          BICEP_FILE="${BICEP_FILE:-$DRIFT_BICEP_FILE}"

          # If path starts with ../ or absolute, use as-is; otherwise prepend bicep-repo
          if [[ "$BICEP_FILE" == /* ]] || [[ "$BICEP_FILE" == ../* ]]; then
            # Absolute or relative path
            BICEP_FILE="${BICEP_FILE}"
          else
            # Relative to external repo
            BICEP_FILE="bicep-repo/${BICEP_FILE:-bicep/main.bicep}"
          fi

          RESOURCE_GROUP="${{ github.event.inputs.resource_group }}"
          RESOURCE_GROUP="${RESOURCE_GROUP:-$DRIFT_RESOURCE_GROUP}"
          RESOURCE_GROUP="${RESOURCE_GROUP:-rg-prod}"

          echo "Running drift check..."
          echo "Bicep file: $BICEP_FILE"
          echo "Resource group: $RESOURCE_GROUP"
          echo "Python version:"
          python --version
          echo ""

          python -u analyze_drift.py "$BICEP_FILE" "$RESOURCE_GROUP" 2>&1 | tee drift_output.txt
          EXIT_CODE=${PIPESTATUS[0]}

          if [ $EXIT_CODE -ne 0 ]; then
            echo ""
            echo "❌ Drift check failed with exit code $EXIT_CODE"
            exit $EXIT_CODE
          fi

          echo ""
          echo "✓ Drift check completed successfully"

          # Extract key metrics (set safe defaults)
          TOTAL_DRIFTS=$(grep -o "Found [0-9]*" drift_output.txt | head -1 | grep -o "[0-9]*" 2>/dev/null || true)
          TOTAL_DRIFTS="${TOTAL_DRIFTS:-0}"

          MISSING=$(grep -c "\[MISSING\]" drift_output.txt 2>/dev/null || true)
          MISSING="${MISSING:-0}"

          EXTRA=$(grep -c "\[EXTRA\]" drift_output.txt 2>/dev/null || true)
          EXTRA="${EXTRA:-0}"

          # Write outputs in correct format
          {
            echo "total_drifts=$TOTAL_DRIFTS"
            echo "missing=$MISSING"
            echo "extra=$EXTRA"
          } >> $GITHUB_OUTPUT

      - name: Publish drift report to summary
        if: github.event_name != 'pull_request' && always()
        run: |
          TOTAL="${{ steps.drift.outputs.total_drifts }}"
          MISSING="${{ steps.drift.outputs.missing }}"
          EXTRA="${{ steps.drift.outputs.extra }}"

          # Determine status
          if [ "$TOTAL" = "0" ] || [ -z "$TOTAL" ]; then
            STATUS="✅ No drift detected"
            STATUS_COLOR="success"
          else
            STATUS="⚠️ Drift detected"
            STATUS_COLOR="warning"
          fi

          {
            echo "## 🔍 Bicep Drift Check Report"
            echo ""
            echo "### Status: $STATUS"
            echo ""
            echo "### Summary"
            echo "| Metric | Count |"
            echo "|--------|-------|"
            echo "| Total Issues | **${TOTAL:-0}** |"
            echo "| Missing Resources | ${MISSING:-0} |"
            echo "| Extra Resources | ${EXTRA:-0} |"
            echo ""

            if [ "$TOTAL" != "0" ] && [ -f drift_output.txt ]; then
              echo "### Issues Found"
              echo ""
              # Extract drift details from output
              if grep -q "\[MISSING\]" drift_output.txt; then
                echo "#### Missing Resources"
                grep "\[MISSING\]" drift_output.txt | sed 's/^/- /' || echo "- (No details)"
                echo ""
              fi
              if grep -q "\[EXTRA\]" drift_output.txt; then
                echo "#### Extra Resources"
                grep "\[EXTRA\]" drift_output.txt | sed 's/^/- /' || echo "- (No details)"
                echo ""
              fi
            fi

            if [ -f drift_output.txt ]; then
              echo "<details>"
              echo "<summary>📋 Full Output</summary>"
              echo ""
              echo "\`\`\`"
              cat drift_output.txt
              echo "\`\`\`"
              echo ""
              echo "</details>"
            fi
          } >> $GITHUB_STEP_SUMMARY

      - name: Skip drift check for PRs
        if: github.event_name == 'pull_request'
        run: echo "ℹ Drift checks only run on push to main/develop. Use workflow_dispatch to test manually."

      - name: Comment on PR
        if: github.event_name == 'pull_request' && steps.drift.outcome == 'success'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('drift_output.txt', 'utf8');
            const total = '${{ steps.drift.outputs.total_drifts }}';
            const missing = '${{ steps.drift.outputs.missing }}';
            const extra = '${{ steps.drift.outputs.extra }}';

            let comment = `## 🔍 Bicep Drift Check\n\n`;
            comment += `**Summary:**\n`;
            comment += `- Total Drift Issues: **${total}**\n`;
            comment += `- Missing Resources: ${missing}\n`;
            comment += `- Extra Resources: ${extra}\n\n`;

            if (total > 0) {
              comment += `### Drift Details\n\`\`\`\n${output.split('\n').slice(-30).join('\n')}\n\`\`\`\n`;
            } else {
              comment += `✅ **No drift detected!**\n`;
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Block PR if critical drift
        if: github.event_name == 'pull_request' && steps.drift.outputs.total_drifts > 5
        run: |
          echo "❌ Critical drift detected (>5 issues). Please review and fix before merging."
          exit 1

      - name: Send multi-team notifications
        if: github.event_name != 'pull_request' && always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          DRIFT_NOTIFICATIONS: ${{ vars.DRIFT_NOTIFICATIONS }}
          PYTHONUNBUFFERED: '1'
        run: |
          REPORT_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          # Only send notifications if webhooks or team config is defined
          if [ -z "$SLACK_WEBHOOK_URL" ] && [ -z "$TEAMS_WEBHOOK_URL" ] && [ -z "$DRIFT_NOTIFICATIONS" ]; then
            echo "ℹ No notification webhooks configured"
            exit 0
          fi

          echo "📢 Processing notifications..."
          python3 tools/send_notifications.py drift_output.txt "$REPORT_URL"

      - name: Upload drift reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: drift-reports
          path: reports/
          retention-days: 30
          include-hidden-files: true

      - name: Display HTML report link
        if: always()
        run: |
          echo "📊 Drift reports generated:"
          echo ""
          if [ -f "reports/rg-prod-drift.html" ]; then
            echo "- HTML Report: Download the 'drift-reports' artifact and open the .html file in a browser"
          fi
          if [ -f "reports/rg-prod-drift.json" ]; then
            echo "- JSON Data: Available in 'drift-reports' artifact"
          fi
