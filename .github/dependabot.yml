version: 2
updates:
  # Keep GitHub Actions pinned to SHAs current. Actions are pinned to full
  # commit SHAs (supply-chain hardening); without Dependabot those pins rot and
  # miss security patches. Dependabot bumps the SHA and updates the trailing
  # "# vX" version comment.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    # Wait 7 days after a release before opening a PR for it, so a freshly
    # published (possibly compromised or broken) version has time to be caught
    # and pulled before we adopt it.
    cooldown:
      default-days: 7
    groups:
      actions:
        patterns: ["*"]

  # Python deps for the drift agent.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    groups:
      python:
        patterns: ["*"]
