# Landing Zone Index
#
# This file maps Landing Zones to their configuration files in external Bicep repos.
# Each team manages their own LZ config in their Bicep repository.
#
# To add a new landing zone:
# 1. Copy .github/workflows/drift-lz-template.yml to drift-lz-<TEAM_NAME>.yml
# 2. Update the schedule, landing_zone parameter, and workflow name
# 3. Add an entry below in this file
#
# Format:
#   landing_zones:
#     lz-name:
#       repo: org/repo-name                          # GitHub repo with Bicep
#       config_path: .github/drift-lz-config.yml     # Path to LZ config in that repo
#       schedule: '0 9 * * *'                        # Cron: when to run (UTC)
#       workflow: drift-lz-lz-name.yml               # Workflow file to run

landing_zones:
  landingzone:
    repo: jaxywaxy/azure-landingzone-bicep
    config_path: .github/drift-lz-config.yml
    workflow: drift-lz-landingzone.yml

  spoke-drifttest:
    repo: jaxywaxy/azure-landingzone-bicep
    config_path: .github/drift-lz-spoke-config.yml
    workflow: drift-lz-spoke.yml

  test-resources:
    repo: jaxywaxy/drift-test-resources
    config_path: .github/drift-lz-config.yml
    workflow: drift-lz-test.yml

  database-testing:
    repo: jaxywaxy/drift-test-resources
    config_path: .github/drift-lz-database-config.yml
    workflow: drift-lz-database.yml

  frontend:
    repo: myorg/frontend-bicep
    config_path: .github/drift-lz-config.yml
    workflow: drift-lz-frontend.yml

  backend:
    repo: myorg/backend-bicep
    config_path: .github/drift-lz-config.yml
    workflow: drift-lz-backend.yml

  database:
    repo: myorg/database-bicep
    config_path: .github/drift-lz-config.yml
    workflow: drift-lz-database.yml
